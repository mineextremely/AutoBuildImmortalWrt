name: build-N1-25.12.x
on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "填写 25.12.x 实验版 ImageBuilder 标签，例如 25.12.0-rc1"
        required: true
        default: "25.12.0-rc1"
        type: string
      openwrt_kernel:
        description: "选择构建的内核(斐讯N1)"
        required: false
        default: "6.6.120"
        type: choice
        options:
          - 5.4.291
          - 5.10.235
          - 5.15.189
          - 6.1.160
          - 6.6.120
          - 6.12.65
      include_docker:
        description: |
          是否编译 Docker 官方插件
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      skip_imagebuilder:
        description: "直接使用底包快速构建固件 ----（跳过 ImageBuilder）"
        required: false
        default: false
        type: boolean
      custom_rootfs_url:
        description: "25.12.x 预构建 rootfs.tar.gz 链接，跳过 ImageBuilder 时必填"
        required: false
        default: ""
        type: string
      replace_banner:
        description: '替换为ImmortalWrt的banner信息'
        required: false
        default: false
        type: boolean
      rootfs_partsize:
        description: '软件包大小1G固定'
        required: true
        default: "1024"
        type: choice
        options:
          - '1024'
      builder_name:
        description: "设置打包作者的名称"
        required: true
        default: 'minex'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/n1/build25.sh

      - name: Debug workspace contents
        run: ls -R

      - name: 处理是否替换 banner 信息
        if: ${{ github.event.inputs.skip_imagebuilder == 'false' && github.event.inputs.replace_banner == 'true' }}
        run: |
          if [ -f "banner/n1/banner" ]; then
            echo "✅ 找到 N1 自定义 banner 文件"
            cp banner/99-banner.sh files/etc/uci-defaults/
            chmod +x files/etc/uci-defaults/99-banner.sh
          else
            echo "⚠️ 未找到 banner/n1/banner，跳过 banner 替换"
          fi

      - name: Building N1 ImmortalWrt rootfs 25.12.x
        if: ${{ github.event.inputs.skip_imagebuilder != 'true' }}
        run: |
          echo "✅ 使用 ImageBuilder 构建 rootfs"
          profiles="generic"
          include_docker="${{ github.event.inputs.include_docker }}"
          rootfs_partsize="${{ github.event.inputs.rootfs_partsize }}"
          luci_version="${{ github.event.inputs.luci_version }}"
          if [[ "$luci_version" =~ ^25\.12-rc([0-9]+)$ ]]; then
            luci_version="25.12.0-rc${BASH_REMATCH[1]}"
            echo "Normalized luci_version to: $luci_version"
          fi
          
          IFS=',' read -r -a profile_array <<< "$profiles"
          
          for profile in "${profile_array[@]}"; do
            echo "Building for profile: $profile"
            
            docker run --rm -i \
              --user root \
              -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
              -v "${{ github.workspace }}/files/etc/uci-defaults:/home/build/immortalwrt/files/etc/uci-defaults" \
              -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
              -v "${{ github.workspace }}/banner/n1/banner:/home/build/immortalwrt/files/mnt/banner" \
              -v "${{ github.workspace }}/n1/build25.sh:/home/build/immortalwrt/build.sh" \
              -e PROFILE=$profile \
              -e INCLUDE_DOCKER=$include_docker \
              -e ROOTFS_PARTSIZE=$rootfs_partsize \
              immortalwrt/imagebuilder:armsr-armv8-openwrt-${luci_version} /bin/bash /home/build/immortalwrt/build.sh
          done

      - name: Download prebuilt rootfs.tar.gz
        if: ${{ github.event.inputs.skip_imagebuilder == 'true' }}
        run: |
          echo "📦 正在下载预构建 rootfs"
          CUSTOM_ROOTFS_URL="${{ github.event.inputs.custom_rootfs_url }}"
          if [ -z "$CUSTOM_ROOTFS_URL" ]; then
            echo "❌ 25.12.x 暂无内置默认 rootfs 链接，请填写 custom_rootfs_url"
            exit 1
          fi
          echo "PREBUILT_NAME_PREFIX=custom-wrt" >> $GITHUB_ENV
          echo "PREBUILT_LUCI_VERSION=unknown" >> $GITHUB_ENV
          mkdir -p bin/targets/armsr/armv8
          curl --fail --location --show-error --silent \
            -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
            "$CUSTOM_ROOTFS_URL"

      - name: 查找rootfs.tar.gz所在路径
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ Found: $ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ 找不到 rootfs.tar.gz 文件"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: Package armsr-armv8 as ImmortalWrt for N1
        uses: wukongdaily/flippy-openwrt-actions@master
        if: ${{ steps.down.outputs.status }} == 'success' && !cancelled()
        env:
          OPENWRT_ARMVIRT: ${{ steps.find_rootfs.outputs.file }}
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
          KERNEL_AUTO_LATEST: false
          WHOAMI: ${{ inputs.builder_name }}

      - name: Rename .img.gz file
        id: rename
        run: |
          FILE=$(ls ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz | head -n1)
          echo "Image file is: $FILE"
          FILENAME=$(basename "$FILE")
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          KERNEL_VERSION=$(echo "$FILENAME" | grep -oP 'k\d+\.\d+\.\d+')
          LUCI_VERSION="${{ github.event.inputs.luci_version }}"
          if [[ "$LUCI_VERSION" =~ ^25\.12-rc([0-9]+)$ ]]; then
             LUCI_VERSION="25.12.0-rc${BASH_REMATCH[1]}"
          fi

          if [ -n "$PREBUILT_LUCI_VERSION" ]; then
             echo "PREBUILT_LUCI_VERSION is not empty: $PREBUILT_LUCI_VERSION"
             mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/$PREBUILT_NAME_PREFIX-$PREBUILT_LUCI_VERSION-phicomm-n1-btrfs-$KERNEL_VERSION.img.gz"
          else
             mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/immortalwrt-$LUCI_VERSION-phicomm-n1-btrfs-$KERNEL_VERSION.img.gz"
          fi

      - name: Upload firmware to GitHub Releases
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: phicomm-n1
          name: ImmortalWrt for Phicomm N1 25.12.x
          body_path: ${{ github.workspace }}/n1/info.md
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
